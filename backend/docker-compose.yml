services:
  backend:
    container_name: backend
    image: 207567788967.dkr.ecr.ap-northeast-2.amazonaws.com/gogo-server:latest
    ports:
      - "80:8080"
    restart: unless-stopped
    env_file:
      - .env                       # 로컬 개발용 .env 자동 로드
    environment:
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom"
      # DB
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DDL_AUTO: ${DDL_AUTO:-validate}    # 프로덕션은 validate (update 금지)
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # Naver
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      # OAuth - Kakao
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI}
      # OAuth - Google
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      # App
      FRONTEND_URL: ${FRONTEND_URL}
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1:8080/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s             # Spring Boot 기동 시간 여유
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
